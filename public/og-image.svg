      <text x="14" y="22" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#374151">Cocina</text>
      <rect x="248" y="10" width="80" height="20" rx="4" fill="#dcfce7" stroke="#bbf7d0"/>
